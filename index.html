<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;overscroll-behavior:none}
:root{--accent:#0f172a;--accent-light:#e2e8f0;--bg:#f1f5f9;--surface:#fff;--text:#0f172a;--muted:#475569;--faint:#94a3b8;--sidebar:#0f172a}
.theme-rose{--accent:#be123c;--accent-light:#fce7f3;--bg:#fff1f2;--sidebar:#4c0519}
.theme-violet{--accent:#6d28d9;--accent-light:#ede9fe;--bg:#f5f3ff;--sidebar:#2e1065}
.theme-teal{--accent:#0f766e;--accent-light:#ccfbf1;--bg:#f0fdfa;--sidebar:#134e4a}
.theme-amber{--accent:#b45309;--accent-light:#fef3c7;--bg:#fffbeb;--sidebar:#451a03}
.theme-slate{--accent:#0f172a;--accent-light:#e2e8f0;--bg:#f1f5f9;--sidebar:#0f172a}
button,input,select,textarea{font-family:inherit;font-size:15px}
button{cursor:pointer}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* ── LAYOUT ── */
.app-shell{display:flex;min-height:100vh}

/* Sidebar — desktop only */
.sidebar{display:none;background:var(--sidebar)}

/* Mobile header */
.mobile-header{background:var(--sidebar);padding:12px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(0,0,0,0.4)}
.header-title{font-size:10px;letter-spacing:3px;color:#64748b;text-transform:uppercase}
.header-name{font-size:17px;font-weight:700;color:#f8fafc;margin-top:2px;margin-bottom:10px}
.tabs{display:flex;gap:4px;margin-bottom:4px}
.tabs2{display:flex;gap:4px}
.tab{flex:1;border-radius:9px;font-size:11px;padding:8px 2px;text-transform:capitalize;border:1px solid #334155;background:transparent;color:#94a3b8;transition:all 0.15s}
.tab.active{background:#f8fafc;color:#0f172a;border-color:#f8fafc;font-weight:700}
.tab2{flex:1;border-radius:9px;font-size:11px;padding:7px 2px;text-transform:capitalize;border:1px solid #334155;background:transparent;color:#64748b;transition:all 0.15s}
.tab2.active{background:#f1f5f9;color:#0f172a;border-color:#94a3b8;font-weight:700}

/* Main content */
.main-content{flex:1;overflow-y:auto}
.content{max-width:680px;margin:0 auto;padding:20px 16px 80px}

/* ── DESKTOP ── */
@media(min-width:860px){
  .mobile-header{display:none}
  .sidebar{
    display:flex;flex-direction:column;
    width:240px;min-height:100vh;
    background:#0f172a;
    position:sticky;top:0;height:100vh;overflow-y:auto;
    padding:24px 16px;flex-shrink:0;
  }
  .sidebar-title{font-size:10px;letter-spacing:3px;color:#475569;text-transform:uppercase;margin-bottom:4px}
  .sidebar-name{font-size:20px;font-weight:700;color:#f8fafc;margin-bottom:28px}
  .sidebar-section{font-size:10px;letter-spacing:2px;color:#475569;text-transform:uppercase;margin-bottom:8px;margin-top:20px;padding-left:4px}
  .sidebar-btn{
    display:block;width:100%;text-align:left;
    padding:10px 14px;border-radius:10px;
    font-size:13px;font-weight:400;
    background:transparent;color:#94a3b8;
    border:none;margin-bottom:3px;
    transition:all 0.15s;cursor:pointer;
  }
  .sidebar-btn:hover{background:#1e293b;color:#e2e8f0}
  .sidebar-btn.active{background:#f8fafc;color:#0f172a;font-weight:700}
  .content{max-width:760px;margin:0 auto;padding:32px 40px 60px}
  .main-content{background:#f1f5f9;flex:1;min-width:0;overflow-x:hidden}
}

/* ── COMPONENTS ── */
.card{background:var(--surface);border:1px solid #e2e8f0;border-radius:14px;padding:16px;margin-bottom:12px}
.inp{border:1px solid #e2e8f0;border-radius:10px;padding:11px 14px;background:#f8fafc;color:#0f172a;outline:none;width:100%}
.toast{position:fixed;top:16px;right:16px;z-index:999;background:#15803d;color:#fff;padding:12px 20px;border-radius:12px;font-size:15px;font-weight:600;display:none;box-shadow:0 4px 24px rgba(21,128,61,0.4)}

.check-box{width:24px;height:24px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;transition:all 0.18s;border:2px solid #e2e8f0;background:transparent}
.check-box.done{background:#15803d;border-color:#15803d;box-shadow:0 2px 8px rgba(21,128,61,0.3)}

.rutina-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1.5px solid #e2e8f0;border-radius:12px;cursor:pointer;transition:all 0.18s;margin-bottom:8px;background:#fff;user-select:none;-webkit-user-select:none}
.rutina-row:hover{border-color:#cbd5e1;background:#fafafa}
.rutina-row.done{background:#f0fdf4;border-color:#86efac}
.rutina-nombre{font-size:15px;font-weight:500;transition:all 0.18s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rutina-nombre.done{color:#15803d;text-decoration:line-through}
.rutina-frec{font-size:11px;color:#94a3b8;margin-top:2px}

.progress-bar-bg{background:#f1f5f9;border-radius:99px;height:10px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;transition:width 0.5s ease}
.stat-card{border-radius:14px;padding:14px 8px;text-align:center}
.stat-num{font-size:30px;font-weight:800;line-height:1}
.stat-sub{font-size:11px;margin-top:5px;font-weight:500}

.meal-row{display:flex;gap:10px;padding:12px 14px;margin-bottom:8px;border-radius:10px;cursor:pointer;border:1.5px solid #e2e8f0;transition:all 0.15s}
.meal-row:hover{background:#fafafa}
.meal-row.done{background:#f0fdf4;border-color:#86efac}
.meal-check{width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;border:2px solid #e2e8f0;background:transparent}
.meal-check.done{background:#15803d;border-color:#15803d}

.mov-row{display:flex;align-items:center;gap:10px;padding:12px 14px;margin-bottom:8px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;border-left-width:4px;transition:all 0.15s}
.nota-card{background:#fff;border:1px solid #e2e8f0;border-left:4px solid #e2e8f0;border-radius:12px;padding:14px 16px;margin-bottom:8px;transition:all 0.15s}
.contador-card{background:#fff;border-radius:14px;padding:20px;margin-bottom:12px;border:1.5px solid rgba(0,0,0,0.1);border-left-width:5px}
.proj-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;border:1.5px solid #e2e8f0;border-left-width:5px;transition:all 0.15s}
.compra-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #dcfce7}

.agua-btn{width:40px;height:40px;border-radius:10px;border:2px solid #93c5fd;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:all 0.15s}
.agua-btn.lleno{background:#2563eb;border-color:#1d4ed8}
.sueno-btn{flex:1;border-radius:9px;font-size:13px;padding:12px 6px;border:1px solid #c4b5fd;background:#ede9fe;color:#6d28d9;cursor:pointer;transition:all 0.15s;text-align:center}
.sueno-btn.active{background:#6d28d9;color:#fff;border-color:#6d28d9;font-weight:700}
.animo-emoji{font-size:32px;cursor:pointer;transition:all 0.15s;opacity:0.3;user-select:none;-webkit-user-select:none;padding:4px}
.animo-emoji.active{opacity:1;transform:scale(1.25)}

.cal-cell{border:1.5px solid #e2e8f0;border-radius:9px;padding:5px 3px 4px;cursor:pointer;min-height:44px;background:#fff;transition:all 0.12s}
.cal-cell:hover{border-color:#cbd5e1;background:#fafafa}
.cal-cell.hoy{background:#dbeafe;border-color:#93c5fd}
.cal-cell.sel{background:#0f172a;border-color:#0f172a}
.cal-dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.semana-check{width:28px;height:28px;border-radius:7px;cursor:pointer;border:1.5px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700;background:#fff;transition:all 0.12s}

.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px;font-weight:700;width:100%;transition:opacity 0.15s}
.btn-primary:hover{opacity:0.85}
.btn-danger{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;border-radius:9px;padding:9px;font-weight:600}
.btn-success{background:#15803d;color:#fff;border:none;border-radius:9px;padding:11px;font-weight:700;width:100%}
.estado-badge{font-size:11px;padding:3px 9px;border-radius:7px;font-weight:600}
.page-title{font-size:22px;font-weight:800;color:#0f172a;margin-bottom:20px;display:none}
@media(min-width:860px){.page-title{display:block}}

select{background:#f8fafc;color:#0f172a;border:1px solid #e2e8f0;border-radius:10px;padding:11px 14px;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer}
textarea{border:1px solid #e2e8f0;border-radius:11px;padding:11px 13px;background:#fff;color:#0f172a;outline:none;resize:none;width:100%}
</style>
</head>

// ── HELPERS ──
const pad = n => String(n).padStart(2,'0');
const uid = () => Math.random().toString(36).slice(2,8);
const mkKey = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const $ = id => document.getElementById(id);
const el = (tag,props={},children=[]) => {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if(k==='class') e.className=v;
    else if(k==='style') e.style.cssText=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.forEach(c => { if(c!=null) e.append(typeof c==='string'?document.createTextNode(c):c); });
  return e;
};

function getTodayKey() {
  const n=new Date();
  return mkKey(n.getFullYear(),n.getMonth(),n.getDate());
}
function getTodayLabel() {
  const n=new Date();
  const dias=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  return `${dias[n.getDay()]} ${n.getDate()} ${meses[n.getMonth()]}`;
}
function last7() {
  const result=[]; const n=new Date();

    result.push({key:mkKey(d.getFullYear(),d.getMonth(),d.getDate()),label:DC[dow===0?6:dow-1],dia:d.getDate()});
  }
  return result;
}

function renderRutinas() {
  const hoy=getTodayKey();
  const todas=state.grupos.flatMap(g=>g.items.map(i=>({...i,color:g.color})));
  const doneHoy=todas.filter(r=>state.checks[`${hoy}__${r.id}`]).length;
  const total=todas.length;
  const pct=total===0?0:Math.round(doneHoy/total*100);

  let racha=0;
  for(let i=0;i<60;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=mkKey(d.getFullYear(),d.getMonth(),d.getDate());
    if(todas.some(r=>state.checks[`${k}__${r.id}`])) racha++;
    else if(i>0) break;
  }

  const c=$('content');
  c.innerHTML='';

  // Stats
  const stats=div('',[],'display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px');
  [[doneHoy,'hechas hoy','#dcfce7','#15803d'],[racha,'días racha','#ede9fe','#6d28d9'],[total,'hábitos','#dbeafe','#1d4ed8']].forEach(([v,s,bg,color])=>{
    const card=div('stat-card',[],`background:${bg};border:1px solid ${color}33`);
    card.appendChild(el('div',{style:`font-size:30px;font-weight:800;color:${color};line-height:1`},[String(v)]));
    card.appendChild(el('div',{style:`font-size:11px;color:${color};margin-top:5px;font-weight:500`},[s]));
    stats.appendChild(card);
  });
  c.appendChild(stats);

  // Progress
  const prog=div('card');
  const progTop=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-bottom:8px`);
  progTop.appendChild(span('Progreso de hoy','font-size:14px;font-weight:600'));
  progTop.appendChild(span(`${pct}%`,`font-size:17px;font-weight:800;color:${pct===100?'#15803d':'#1d4ed8'}`));
  prog.appendChild(progTop);
  const pbg=div('progress-bar-bg');
  const pb=div('progress-bar',[],`width:${pct}%;background:${pct===100?'#15803d':pct>50?'#1d4ed8':'#b45309'}`);

    const row=div('',[],`display:flex;gap:8px`);
    const fsel=el('select',{style:'flex:1;border:1px solid #e2e8f0;border-radius:10px;padding:11px 14px;background:#f8fafc;color:#0f172a;outline:none'},FREC_OPTS.map(f=>el('option',{value:f},[f])));

    row.appendChild(btn('+','btn-primary',()=>{
      const nombre=$('new-rut-nombre').value.trim();
      if(!nombre) return;

      state.grupos=state.grupos.map(g=>g.id!==gid?g:{...g,items:[...g.items,{id:uid(),nombre,frec}]});

    },'flex:1'));

    c.appendChild(addForm);
  }

  if(state.vistaRut==='hoy') {

    // ── BIENESTAR ARRIBA ──
    const hoy2=getTodayKey();
    const hb=state.bienestar[hoy2]||{agua:0,sueno:0,animo:0};
    const ANIMOS=['😔','😐','🙂','😊','🤩'];
    const bSection=div('card',[],`margin-bottom:20px`);
    bSection.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:#1d4ed8;margin-bottom:14px'},['💧 Bienestar de hoy']));
    // Agua
    bSection.appendChild(el('div',{style:'font-size:12px;font-weight:600;color:#1d4ed8;margin-bottom:7px'},[`Agua — ${hb.agua}/8 vasos`]));
    const aguaRow=div('',[],`display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px`);
    for(let i=0;i<8;i++){
      const ab=div('',[i<hb.agua?'💧':'·'],`width:36px;height:36px;border-radius:9px;border:2px solid ${i<hb.agua?'#1d4ed8':'#93c5fd'};background:${i<hb.agua?'#2563eb':'#dbeafe'};display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;user-select:none;-webkit-user-select:none`);
      ab.addEventListener('click',()=>{const val=i<hb.agua?i:i+1;state.bienestar[hoy2]={...hb,agua:val};save();render();});
      aguaRow.appendChild(ab);
    }
    bSection.appendChild(aguaRow);
    // Sueño
    bSection.appendChild(el('div',{style:'font-size:12px;font-weight:600;color:#6d28d9;margin-bottom:7px'},[`Sueño — ${hb.sueno||'—'}h`]));
    const sRow=div('',[],`display:flex;gap:5px;margin-bottom:14px`);
    [5,6,7,8,9,10].forEach(h=>{
      const sb2=el('button',{style:`flex:1;border-radius:8px;font-size:12px;padding:9px 4px;border:1px solid ${hb.sueno===h?'#6d28d9':'#c4b5fd'};background:${hb.sueno===h?'#6d28d9':'#ede9fe'};color:${hb.sueno===h?'#fff':'#6d28d9'};font-weight:${hb.sueno===h?700:400};cursor:pointer`},[`${h}h`]);
      sb2.addEventListener('click',()=>{state.bienestar[hoy2]={...hb,sueno:h};save();render();});
      sRow.appendChild(sb2);
    });
    bSection.appendChild(sRow);
    // Ánimo
    bSection.appendChild(el('div',{style:'font-size:12px;font-weight:600;color:#a16207;margin-bottom:8px'},['Ánimo del día']));
    const aRow=div('',[],`display:flex;gap:8px;justify-content:space-around;margin-bottom:6px`);
    ANIMOS.forEach((a,i)=>{
      const ae=el('div',{style:`font-size:28px;cursor:pointer;opacity:${hb.animo===i+1?1:0.3};transform:${hb.animo===i+1?'scale(1.2)':'scale(1)'};transition:all 0.15s;user-select:none;-webkit-user-select:none`},[a]);
      ae.addEventListener('click',()=>{state.bienestar[hoy2]={...hb,animo:i+1};save();render();});
      aRow.appendChild(ae);
    });
    bSection.appendChild(aRow);
    if(hb.animo>0) bSection.appendChild(el('div',{style:'text-align:center;font-size:12px;color:#a16207;margin-top:4px'},[['Un día difícil','Día normal','Bien','Muy bien','Excelente'][hb.animo-1]]));
    c.appendChild(bSection);

    state.grupos.forEach(g=>{
      if(!g.items.length) return;
      const hechos=g.items.filter(it=>state.checks[`${hoy}__${it.id}`]).length;
      const section=div('',[],`margin-bottom:22px`);
      const header=div('',[],`display:flex;align-items:center;justify-content:space-between;margin-bottom:8px`);
      const left=div('',[],`display:flex;align-items:center;gap:8px`);
      left.appendChild(span(g.emoji,'font-size:18px'));
      left.appendChild(span(g.label,`font-size:14px;font-weight:700;color:${g.color}`));
      header.appendChild(left);
      header.appendChild(span(`${hechos}/${g.items.length}`,`font-size:12px;color:${hechos===g.items.length?'#15803d':'#94a3b8'};font-weight:${hechos===g.items.length?700:400}`));
      section.appendChild(header);
      g.items.forEach(item=>{
        const done=!!state.checks[`${hoy}__${item.id}`];
        if(state.editMode) {
          const row=div('',[],`display:flex;align-items:center;gap:7px;padding:9px 12px;background:#fffbeb;border:1px solid #b4530955;border-radius:10px;margin-bottom:7px`);
          const inp=el('input',{value:item.nombre,style:'flex:1;border:1px solid #e2e8f0;border-radius:9px;padding:7px 9px;font-size:13px;background:#fff;color:#0f172a;outline:none'});
          inp.addEventListener('input',e=>{state.grupos=state.grupos.map(g2=>g2.id!==g.id?g2:{...g2,items:g2.items.map(it=>it.id!==item.id?it:{...it,nombre:e.target.value})});save();});
          const fsel=el('select',{style:'border:1px solid #e2e8f0;border-radius:9px;padding:7px;font-size:12px;background:#fff;color:#0f172a;outline:none'},FREC_OPTS.map(f=>{ const o=el('option',{value:f},[f]); if(f===item.frec) o.selected=true; return o; }));
          fsel.addEventListener('change',e=>{state.grupos=state.grupos.map(g2=>g2.id!==g.id?g2:{...g2,items:g2.items.map(it=>it.id!==item.id?it:{...it,frec:e.target.value})});save();});
          const delBtn=btn('×','',()=>{state.grupos=state.grupos.map(g2=>g2.id!==g.id?g2:{...g2,items:g2.items.filter(it=>it.id!==item.id)});save();render();},'background:#fee2e2;color:#b91c1c;border:1px solid #fca5a544;border-radius:7px;padding:7px 10px;font-size:15px;font-weight:700');
          row.appendChild(inp); row.appendChild(fsel); row.appendChild(delBtn);
          section.appendChild(row);
        } else {
          const row=div('rutina-row'+(done?' done':''));
          row.addEventListener('click',()=>{const k=`${hoy}__${item.id}`;state.checks[k]=!state.checks[k];save();render();});
          const cb=div('check-box'+(done?' done':''),[done?'✓':'']);
          const info=div('',[],`flex:1`);
          info.appendChild(el('div',{class:'rutina-nombre'+(done?' done':'')},[item.nombre]));
          info.appendChild(el('div',{class:'rutina-frec'},[item.frec]));
          const emo=span(g.emoji,`font-size:16px;opacity:${done?1:0.2}`);
          row.appendChild(cb); row.appendChild(info); row.appendChild(emo);
          section.appendChild(row);
        }
      });
      // "+ agregar ítem" button per group (edit mode)
      if(state.editMode) {
        const addRow=div('',[],`display:flex;gap:8px;margin-top:4px`);
        const addInp=el('input',{placeholder:`Nueva rutina en ${g.label}...`,style:`flex:1;border:1px solid #e2e8f0;border-radius:9px;padding:8px 10px;font-size:13px;background:#fff;color:#0f172a;outline:none;font-family:inherit`,id:`add-inp-${g.id}`});
        const addBtn=btn('+','',()=>{
          const inp=document.getElementById(`add-inp-${g.id}`);
          if(!inp||!inp.value.trim()) return;
          state.grupos=state.grupos.map(g2=>g2.id!==g.id?g2:{...g2,items:[...g2.items,{id:uid(),nombre:inp.value.trim(),frec:'Diario'}]});
          save(); render();
        },`background:var(--accent);color:#fff;border:none;border-radius:9px;padding:8px 14px;font-size:16px;font-weight:700`);
        addRow.appendChild(addInp);
        addRow.appendChild(addBtn);
        section.appendChild(addRow);
      }
      c.appendChild(section);
    });
  } else {
    // Semana view
    const u7=last7();
    const hoyK=getTodayKey();
    const grid=el('div',{style:'display:grid;grid-template-columns:1fr repeat(7,30px);gap:3px;margin-bottom:8px;align-items:center'});
    grid.appendChild(div(''));
    u7.forEach(d=>{
      const col=div('',[],`text-align:center`);
      col.appendChild(el('div',{style:`font-size:10px;color:${d.key===hoyK?'#1d4ed8':'#94a3b8'}`},[d.label]));
      const num=el('div',{style:`font-size:11px;font-weight:700;color:${d.key===hoyK?'#fff':'#475569'};background:${d.key===hoyK?'#1d4ed8':'transparent'};border-radius:5px;width:24px;height:24px;line-height:24px;margin:2px auto 0;text-align:center`},[String(d.dia)]);
      col.appendChild(num);
      grid.appendChild(col);
    });
    c.appendChild(grid);

    state.grupos.forEach(g=>{
      if(!g.items.length) return;
      const sec=div('',[],`margin-bottom:14px`);
      const hdr=div('',[],`display:flex;align-items:center;gap:7px;margin-bottom:6px`);
      hdr.appendChild(span(g.emoji,'font-size:14px'));
      hdr.appendChild(span(g.label,`font-size:12px;font-weight:700;color:${g.color}`));
      sec.appendChild(hdr);
      g.items.forEach(item=>{
        const row=el('div',{style:'display:grid;grid-template-columns:1fr repeat(7,30px);gap:3px;margin-bottom:5px;align-items:center'});
        row.appendChild(el('div',{style:'font-size:12px;color:#0f172a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:4px'},[item.nombre]));
        u7.forEach(d=>{
          const done=!!state.checks[`${d.key}__${item.id}`];
          const cell=div('semana-check'+(done?'':' '),done?['✓']:['']);
          cell.style.background=done?g.color:'#fff';
          cell.style.borderColor=done?g.color:'#e2e8f0';
          cell.addEventListener('click',()=>{const k=`${d.key}__${item.id}`;state.checks[k]=!state.checks[k];save();render();});
          row.appendChild(cell);
        });
        sec.appendChild(row);
      });
      c.appendChild(sec);
    });

    // Resumen
    const res=div('card');
    res.appendChild(el('div',{style:'font-size:14px;font-weight:700;margin-bottom:12px'},['Resumen semanal']));
    u7.forEach(d=>{
      const cnt=todas.filter(r=>state.checks[`${d.key}__${r.id}`]).length;
      const pct2=total===0?0:cnt/total*100;
      const row=div('',[],`display:flex;align-items:center;gap:10px;margin-bottom:8px`);
      row.appendChild(span(d.label,`font-size:12px;color:${d.key===hoyK?'#1d4ed8':'#475569'};width:22px;font-weight:${d.key===hoyK?700:400}`));
      const bg=div('progress-bar-bg',[],`flex:1`);
      const bar=div('progress-bar',[],`width:${pct2}%;background:${pct2===0?'transparent':pct2>=80?'#15803d':pct2>=50?'#1d4ed8':'#b45309'}`);
      bg.appendChild(bar); row.appendChild(bg);
      row.appendChild(span(`${cnt}/${total}`,'font-size:12px;color:#475569;width:32px;text-align:right'));
      res.appendChild(row);
    });
    c.appendChild(res);
  }

}

// ── RENDER MENÚ ──
function renderMenu() {
  const c=$('content'); c.innerHTML='';

  // Tabs: semanas + editar
  const topRow=div('',[],`display:flex;gap:6px;margin-bottom:12px;align-items:center`);
  const semRow=div('',[],`display:flex;gap:4px;flex:1`);
  [0,1,2,3].forEach(s=>{
    semRow.appendChild(btn(`Sem ${s+1}`,'',()=>{state.semana=s;state.menuEditDia=null;save();render();},`flex:1;border-radius:9px;font-size:12px;font-weight:${state.semana===s?700:400};padding:9px 2px;background:${state.semana===s?'#0f172a':'#fff'};color:${state.semana===s?'#f8fafc':'#475569'};border:1px solid ${state.semana===s?'#0f172a':'#e2e8f0'}`));
  });
  topRow.appendChild(semRow);
  topRow.appendChild(btn(state.verEsposo?'👫':'👤','',()=>{state.verEsposo=!state.verEsposo;render();},`border-radius:9px;font-size:13px;padding:9px 12px;background:#fff;border:1px solid #e2e8f0;color:#475569`));
  c.appendChild(topRow);

  // Use custom menus if they exist, otherwise fall back to MENU defaults
  if(!state.customMenu) state.customMenu={};

  DIAS_SEM.forEach((diaName,di)=>{
    const s=state.semana;
    const defaultDia=MENU[s]?.[di]||{al:{v:'',e:''},ce:{v:'',e:''},tip:''};
    const custom=state.customMenu[`${s}_${di}`]||{};
    const alText=typeof custom.al!=='undefined'?custom.al:defaultDia.al.v;
    const ceText=typeof custom.ce!=='undefined'?custom.ce:defaultDia.ce.v;
    const alIngs=custom.alIngs||'';
    const ceIngs=custom.ceIngs||'';
    const alK=`s${s}d${di}al`; const ceK=`s${s}d${di}ce`;
    const alDone=!!state.meals[alK]; const ceDone=!!state.meals[ceK];
    const isEditing=state.menuEditDia===`${s}_${di}`;

    const card=div('card');
    // Header
    const hdr=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-bottom:10px`);
    hdr.appendChild(span(diaName,'font-size:15px;font-weight:700'));
    const hdrRight=div('',[],`display:flex;gap:6px;align-items:center`);
    hdrRight.appendChild(span(alDone&&ceDone?'✓':'',`font-size:11px;color:#15803d;font-weight:700`));
    hdrRight.appendChild(btn(isEditing?'✓ Listo':'✏️','',()=>{
      if(isEditing){
        // save edits
        const alV=document.getElementById(`al_${s}_${di}`);
        const ceV=document.getElementById(`ce_${s}_${di}`);
        const alI=document.getElementById(`ali_${s}_${di}`);
        const ceI=document.getElementById(`cei_${s}_${di}`);
        if(!state.customMenu) state.customMenu={};
        state.customMenu[`${s}_${di}`]={
          al:alV?alV.value:alText,
          ce:ceV?ceV.value:ceText,
          alIngs:alI?alI.value:alIngs,
          ceIngs:ceI?ceI.value:ceIngs,
        };
        state.menuEditDia=null;
      } else {
        state.menuEditDia=`${s}_${di}`;
      }
      save(); render();
    },`border-radius:7px;font-size:12px;padding:5px 10px;background:${isEditing?'#dcfce7':'#f1f5f9'};color:${isEditing?'#15803d':'#475569'};border:1px solid ${isEditing?'#86efac':'#e2e8f0'}`));
    hdr.appendChild(hdrRight);
    card.appendChild(hdr);

    if(isEditing){
      // Edit mode
      [['al','☀ Almuerzo','#ea580c',`al_${s}_${di}`,alText,`ali_${s}_${di}`,alIngs],
       ['ce','🌙 Cena','#6d28d9',`ce_${s}_${di}`,ceText,`cei_${s}_${di}`,ceIngs]].forEach(([tipo,label,color,idv,val,idi,ings])=>{
        card.appendChild(el('div',{style:`font-size:10px;font-weight:700;color:${color};letter-spacing:1px;margin-bottom:4px`},[label]));
        const ta=el('textarea',{id:idv,rows:'2',style:'width:100%;margin-bottom:5px;font-size:13px'},[val]);
        card.appendChild(ta);
        card.appendChild(el('div',{style:'font-size:10px;color:#94a3b8;margin-bottom:4px'},['Ingredientes (separados por coma):']));
        const ing=el('input',{id:idi,class:'inp',placeholder:'ej: arroz, tofu, cebolla',style:'margin-bottom:10px;font-size:13px;display:block',value:ings});
        card.appendChild(ing);
        // Button to add ingredients to shopping list
        card.appendChild(btn(`+ Agregar ingredientes a compras`,'',()=>{
          const ingVal=document.getElementById(idi)?.value||'';
          if(!ingVal.trim()) return;
          const items=ingVal.split(',').map(s2=>s2.trim()).filter(Boolean);
          let added=0;
          items.forEach(texto=>{
            if(!state.compras.find(cc=>cc.texto.toLowerCase()===texto.toLowerCase())){
              state.compras.push({id:uid(),texto,hecho:false}); added++;
            }
          });
          save(); showToast(`✓ ${added} ingredientes en compras`);
        },`width:100%;border-radius:8px;font-size:12px;padding:8px;background:#f0fdf4;color:#15803d;border:1px solid #86efac;margin-bottom:12px`));
      });
    } else {
      // View mode
      [[alK,'al','☀ ALMUERZO','#ea580c','#fdba74',alDone,alText],
       [ceK,'ce','🌙 CENA','#6d28d9','#818cf8',ceDone,ceText]].forEach(([k,tipo,label,labelColor,leftColor,done,text])=>{
        const row=div('meal-row'+(done?' done':''));
        row.style.borderLeftColor=done?'#15803d':leftColor;
        row.addEventListener('click',()=>{state.meals[k]=!state.meals[k];save();render();});
        const cb=div('meal-check'+(done?' done':''),[done?'✓':'']);
        const info=div('',[],`flex:1`);
        info.appendChild(el('div',{style:`font-size:10px;font-weight:700;color:${labelColor};letter-spacing:1px;margin-bottom:3px`},[label]));
        info.appendChild(el('div',{style:`font-size:13px;color:${done?'#15803d':'#0f172a'};text-decoration:${done?'line-through':'none'}`},[text||'Sin planificar']));
        if(state.verEsposo&&defaultDia[tipo]?.e) info.appendChild(el('div',{style:'font-size:12px;color:#475569;margin-top:2px'},[`🍗 ${defaultDia[tipo].e}`]));
        row.appendChild(cb); row.appendChild(info);
        card.appendChild(row);
      });
    }
    c.appendChild(card);
  });
}

// ── RENDER CALENDARIO ──
function renderCalendario() {
  const c=$('content'); c.innerHTML='';
  const y=new Date().getFullYear(); const m=state.mes;

  // Sync bar
  const syncBar=div('',[],`display:flex;gap:8px;margin-bottom:14px;align-items:center`);
  if(!state.icalUrl) {
    const hint=el('div',{style:'font-size:12px;color:#94a3b8;flex:1;line-height:1.4'},['Para ver tus eventos de Google Calendar, pegá tu URL de iCal (Google Calendar → Configuración → dirección secreta en formato iCal)']);
    const configBtn=btn('Conectar','',()=>{
      const url=prompt('Pegá tu URL de Google Calendar (iCal):','');
      if(url&&url.includes('google.com')){state.icalUrl=url;save();syncGoogleCalendar();}
    },'background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;white-space:nowrap');
    syncBar.appendChild(hint);
    syncBar.appendChild(configBtn);
  } else {
    syncBar.appendChild(el('div',{style:'font-size:12px;color:#15803d;flex:1'},['✓ Google Calendar conectado']));
    const syncBtn=btn('↻ Sync','',syncGoogleCalendar,'background:#f0fdf4;color:#15803d;border:1px solid #86efac;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700');
    const disconnectBtn=btn('✕','',()=>{state.icalUrl='';save();render();},'background:#fff;color:#94a3b8;border:1px solid #e2e8f0;border-radius:8px;padding:7px 10px;font-size:12px');
    syncBar.appendChild(syncBtn);
    syncBar.appendChild(disconnectBtn);
  }
  c.appendChild(syncBar);

  const nav=div('',[],`display:flex;align-items:center;justify-content:space-between;margin-bottom:14px`);
  nav.appendChild(btn('←','',()=>{state.mes=Math.max(0,state.mes-1);render();},'background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:7px 14px;font-size:17px;color:#475569'));
  nav.appendChild(span(`${MESES[m]} ${y}`,'font-size:16px;font-weight:700'));
  nav.appendChild(btn('→','',()=>{state.mes=Math.min(11,state.mes+1);render();},'background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:7px 14px;font-size:17px;color:#475569'));
  c.appendChild(nav);
  const dayHdr=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px'});

  const grid=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:10px'});

  c.appendChild(evHdr);
  if(state.showEvForm){
    const form=div('card',[],`border:1.5px solid #1d4ed8`);
    const titInp=el('input',{class:'inp',placeholder:'Título del evento',id:'ev-titulo',style:'margin-bottom:8px;display:block'});
    const row2=div('',[],`display:flex;gap:8px;margin-bottom:10px`);
    const horaInp=el('input',{type:'time',value:'10:00',id:'ev-hora',style:'flex:1;border:1px solid #e2e8f0;border-radius:10px;padding:11px 14px;background:#f8fafc;color:#0f172a;outline:none'});
    const tipoSel=el('select',{id:'ev-tipo',style:'flex:1;border:1px solid #e2e8f0;border-radius:10px;padding:11px 14px;background:#f8fafc;color:#0f172a;outline:none'},Object.keys(TIPO_COLOR).map(t=>el('option',{value:t},[t])));
    row2.appendChild(horaInp); row2.appendChild(tipoSel);
    const btnRow=div('',[],`display:flex;gap:8px`);
    btnRow.appendChild(btn('Cancelar','',()=>{state.showEvForm=false;render();},'flex:1;background:transparent;border:1px solid #e2e8f0;border-radius:9px;padding:9px;color:#475569'));
    btnRow.appendChild(btn('Guardar','',()=>{
      const titulo=$('ev-titulo').value.trim();
      if(!titulo) return;
      state.eventos.push({fecha:selKey,hora:$('ev-hora').value,titulo,tipo:$('ev-tipo').value});
      state.showEvForm=false; save(); showToast('✓ Guardado'); render();
    },'flex:2;background:#0f172a;color:#fff;border:none;border-radius:9px;padding:9px;font-weight:700'));
    form.appendChild(titInp); form.appendChild(row2); form.appendChild(btnRow);

  if(!selEvs.length){
    c.appendChild(el('div',{style:'text-align:center;color:#94a3b8;padding:16px 0;font-size:13px'},['Sin eventos — tocá + Evento para agregar']));
  } else {
    selEvs.forEach((ev,i)=>{
      const row=div('mov-row',[],`border-left-color:${TIPO_COLOR[ev.tipo]||'#94a3b8'}`);
      row.appendChild(span(TIPO_ICON[ev.tipo]||'📅','font-size:18px'));
      const info=div('',[],`flex:1`);
      info.appendChild(el('div',{style:'font-size:14px;font-weight:500'},[ev.titulo]));
      if(ev.hora!=='00:00') info.appendChild(el('div',{style:'font-size:12px;color:#94a3b8;margin-top:2px'},[`${ev.hora} hs`]));
      row.appendChild(info);
      row.appendChild(btn('×','',()=>{state.eventos.splice(i,1);save();render();},'background:none;border:none;font-size:17px;color:#94a3b8;padding:0 3px'));
      c.appendChild(row);
    });
  }

  // ── TAREAS DEL DÍA ──
  const tareasHdr=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-top:20px;margin-bottom:10px`);
  tareasHdr.appendChild(span('Tareas del día','font-size:15px;font-weight:700'));
  c.appendChild(tareasHdr);

  const tareasKey=selKey;
  if(!state.tareas[tareasKey]) state.tareas[tareasKey]=[];
  const tareasHoy=state.tareas[tareasKey];

  // Input nueva tarea
  const tareaRow=div('',[],`display:flex;gap:8px;margin-bottom:10px`);

      const v=tareaInp.value.trim();

    if(!state.tareas[tareasKey]) state.tareas[tareasKey]=[];
    state.tareas[tareasKey].push({id:uid(),texto:v,done:false});
    save(); render();
  },'background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:16px;font-weight:700');
  tareaRow.appendChild(tareaInp);
  tareaRow.appendChild(addTareaBtn);
  c.appendChild(tareaRow);

  if(!tareasHoy.length){
    c.appendChild(el('div',{style:'text-align:center;color:#94a3b8;padding:12px 0;font-size:13px'},['Sin tareas para este día']));
  } else {
    tareasHoy.forEach((t,i)=>{
      const row=div('',[],`display:flex;align-items:center;gap:12px;padding:11px 14px;margin-bottom:7px;background:#fff;border:1.5px solid ${t.done?'#86efac':'#e2e8f0'};border-left:4px solid ${t.done?'#15803d':'var(--accent)'};border-radius:11px;transition:all 0.15s`);

      row.appendChild(cb); row.appendChild(txt); row.appendChild(del);
      c.appendChild(row);
    });
  }
}

function renderCompras() {

  const row=div('',[],`display:flex;gap:8px;margin-bottom:10px`);
  row.appendChild(inp);

  card.appendChild(btn(`🍽 Generar desde menú semana ${state.semana+1}`,'',()=>{
    const ings=new Set();
    MENU[state.semana].forEach(dia=>{
      [dia.al.v,dia.ce.v].forEach(plato=>{
        ['tofu','arroz','palta','tomate','lechuga','papa','batata','choclo','cebolla','morón','falafel','dumplings','leche de coco','queso','huevo'].forEach(ing=>{
          if(plato.toLowerCase().includes(ing)) ings.add(ing.charAt(0).toUpperCase()+ing.slice(1));
        });
      });
    });
    const nuevos=[...ings].filter(ing=>!state.compras.find(cc=>cc.texto.toLowerCase()===ing.toLowerCase())).map(ing=>({id:uid(),texto:ing,hecho:false}));
    state.compras.push(...nuevos); save(); showToast(`✓ ${nuevos.length} ingredientes`); render();
  },'width:100%;border-radius:9px;font-size:13px;font-weight:600;padding:9px;background:#dcfce7;color:#15803d;border:1px solid #86efac;margin-bottom:10px'));
  if(!state.compras.length) card.appendChild(span('Lista vacía','font-size:13px;color:#94a3b8'));
  else {
    state.compras.forEach((item,i)=>{

// ── RENDER CONTADORES ──
function renderContadores() {
  const c=$('content'); c.innerHTML='';
  c.appendChild(el('div',{style:'font-size:15px;font-weight:700;margin-bottom:14px'},['Contadores de días']));
  state.contadores.forEach(cnt=>{
    const hoy=new Date(); const meta=new Date(cnt.fecha);
    const diff=Math.ceil((meta-hoy)/(1000*60*60*24));
    const pasado=diff<0;
    const card=div('contador-card');
    card.style.borderColor=cnt.color+'44';
    card.style.borderLeftColor=cnt.color;
    const hdr=div('',[],`display:flex;align-items:center;justify-content:space-between;margin-bottom:7px`);
    const left=div('',[],`display:flex;align-items:center;gap:9px`);
    left.appendChild(span(cnt.emoji,'font-size:20px'));
    left.appendChild(span(cnt.label,'font-size:14px;font-weight:700'));
    hdr.appendChild(left);
    if(pasado) hdr.appendChild(el('span',{style:'font-size:11px;padding:3px 8px;border-radius:6px;background:#dcfce7;color:#15803d;font-weight:700'},['✓ Pasó']));
    card.appendChild(hdr);
    const numRow=div('',[],`display:flex;align-items:baseline;gap:6px;margin-bottom:3px`);
    numRow.appendChild(el('span',{style:`font-size:38px;font-weight:800;color:${cnt.color};line-height:1`},[String(Math.abs(diff))]));
    numRow.appendChild(span(pasado?'días desde':'días para','font-size:15px;color:#64748b'));
    card.appendChild(numRow);
    card.appendChild(span(`📅 ${cnt.fecha}`,'font-size:12px;color:#94a3b8;margin-bottom:8px;display:block'));
    const pbg=div('',[],'background:#f1f5f9;border-radius:99px;height:5px;overflow:hidden');
    pbg.appendChild(div('',[],'height:100%;border-radius:99px;background:'+cnt.color+';width:'+Math.max(0,Math.min(100,(1-(diff/365))*100))+'%'));
    card.appendChild(pbg);
    c.appendChild(card);
  });
}

// ── RENDER PROYECTOS ──
function renderProyectos() {
  const c=$('content'); c.innerHTML='';
  const hdr=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-bottom:14px`);
  hdr.appendChild(span('Proyectos 2026','font-size:15px;font-weight:700'));
  hdr.appendChild(btn('+ Nuevo','',()=>{state.showNewProj=!state.showNewProj;render();},'background:#0f172a;color:#fff;border:none;border-radius:9px;padding:8px 13px;font-size:12px;font-weight:700'));
  c.appendChild(hdr);
  if(state.showNewProj) {
    const form=div('card',[],`border:1.5px solid #6d28d9`);
    ['name:Nombre','area:Área','fecha:Fecha'].forEach(pair=>{
      const [k,ph]=pair.split(':');
      form.appendChild(el('input',{id:`np-${k}`,class:'inp',placeholder:ph,type:k==='fecha'?'date':'text',style:'margin-bottom:7px;display:block'}));
    });
    const esSel=el('select',{id:'np-estado',style:'width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:11px 14px;background:#f8fafc;color:#0f172a;outline:none;margin-bottom:10px;display:block'},['En proceso','No iniciado','Pausado','Completado'].map(e=>el('option',{value:e},[e])));
    form.appendChild(esSel);
    form.appendChild(btn('Guardar','btn-primary',()=>{
      const name=$('np-name').value.trim();
      if(!name) return;
      state.proyectos.push({id:uid(),name,area:$('np-area').value,estado:$('np-estado').value,fecha:$('np-fecha').value,color:'#6d28d9'});
      state.showNewProj=false; save(); showToast('✓ Agregado'); render();
    }));
    c.appendChild(form);
  }
  state.proyectos.forEach((p,i)=>{
    const card=div('proj-card');
    card.style.borderLeftColor=p.color;
    card.style.borderColor=state.editProj===p.id?p.color:'#e2e8f0';
    if(state.editProj===p.id) {
      ['name:Nombre','area:Área','fecha:Fecha'].forEach(pair=>{
        const [k,ph]=pair.split(':');
        const inp=el('input',{value:p[k],class:'inp',placeholder:ph,type:k==='fecha'?'date':'text',style:'margin-bottom:7px;display:block'});
        inp.addEventListener('input',e=>{state.proyectos[i][k]=e.target.value;});
        card.appendChild(inp);
      });
      const esSel=el('select',{style:'width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:11px 14px;background:#f8fafc;color:#0f172a;outline:none;margin-bottom:10px;display:block'},['En proceso','No iniciado','Pausado','Completado'].map(e=>{const o=el('option',{value:e},[e]);if(e===p.estado)o.selected=true;return o;}));
      esSel.addEventListener('change',e=>{state.proyectos[i].estado=e.target.value;});
      card.appendChild(esSel);
      const btnRow=div('',[],`display:flex;gap:8px`);
      btnRow.appendChild(btn('Eliminar','btn-danger',()=>{state.proyectos.splice(i,1);state.editProj=null;save();render();},'flex:1'));
      btnRow.appendChild(btn('✓ Listo','',()=>{state.editProj=null;save();render();},'flex:2;background:#0f172a;color:#fff;border:none;border-radius:9px;padding:9px;font-weight:700'));
      card.appendChild(btnRow);
    } else {
      const row=div('',[],`display:flex;justify-content:space-between;align-items:flex-start`);
      const info=div('',[],`flex:1`);
      info.appendChild(el('div',{style:'font-size:14px;font-weight:700;margin-bottom:3px'},[p.name]));
      info.appendChild(span(`${p.area} · ${p.fecha}`,'font-size:12px;color:#94a3b8;display:block;margin-bottom:6px'));
      // Notes textarea
      const noteTA=el('textarea',{rows:'2',placeholder:'Notas, próximos pasos...',style:`width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:13px;background:#f8fafc;color:#0f172a;outline:none;resize:none;font-family:inherit`},[p.nota||'']);
      noteTA.addEventListener('input',e=>{state.proyectos[i].nota=e.target.value;save();});
      info.appendChild(noteTA);
      row.appendChild(info);
      const acts=div('',[],`display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-left:9px`);
      const badge=el('div',{class:'estado-badge'},[ p.estado]);
      badge.style.background=p.estado==='En proceso'?p.color+'18':p.estado==='Completado'?'#dcfce7':'#f1f5f9';
      badge.style.color=p.estado==='En proceso'?p.color:p.estado==='Completado'?'#15803d':'#94a3b8';
      badge.style.border=`1px solid ${p.estado==='En proceso'?p.color+'55':'#e2e8f0'}`;
      acts.appendChild(badge);
      acts.appendChild(btn('✏️','',()=>{state.editProj=p.id;render();},'background:none;border:1px solid #e2e8f0;border-radius:7px;padding:3px 8px;font-size:11px;color:#64748b'));
      acts.appendChild(btn('🗑','',()=>{if(confirm(`¿Eliminar "${p.name}"?`)){state.proyectos.splice(i,1);save();render();}},'background:none;border:1px solid #fca5a5;border-radius:7px;padding:3px 8px;font-size:11px;color:#b91c1c'));
      row.appendChild(acts);
      card.appendChild(row);
    }
    c.appendChild(card);
  });
}

// ── GOOGLE CALENDAR SYNC ──
async function syncGoogleCalendar() {
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        mcp_servers: [{type:'url',url:'https://calendarmcp.googleapis.com/mcp/v1',name:'gcal'}],
        messages: [{role:'user',content:`Lista los eventos de Google Calendar para el mes actual ${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}. Responde SOLO con un JSON array: [{"fecha":"YYYY-MM-DD","hora":"HH:MM","titulo":"string","tipo":"trabajo"}]. Sin texto extra.`}]
      })
    });
    const data = await response.json();
    const textBlock = data.content&&data.content.find(b=>b.type==='text');
    if(!textBlock&&textBlock.text) return;
    const clean = textBlock.text.replace(/```json|```/g,'').trim();
    const gcalEvs = JSON.parse(clean);
    if(!Array.isArray(gcalEvs)) return;
    // Merge: add gcal events not already in state
    let added=0;
    gcalEvs.forEach(ev=>{
      const exists=state.eventos.find(e=>e.fecha===ev.fecha&&e.titulo===ev.titulo);
      if(!exists){ state.eventos.push({...ev,fromGcal:true}); added++; }
    });
    if(added>0){ save(); render(); showToast(`✓ ${added} eventos de Google Calendar`); }
  } catch(e){ console.log('GCal sync error:',e); }
}
