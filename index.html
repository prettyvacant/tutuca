.theme-slate  { --accent:#1e1b18; --accent-light:#f0eeec; --accent-muted:#3d3a37; --sidebar:#1e1b18 }

.theme-violet { --accent:#7c5cfc; --accent-light:#f0ebff; --accent-muted:#5a3fd4; --sidebar:#2e1065 }
.theme-teal   { --accent:#0f766e; --accent-light:#f0fdfa; --accent-muted:#0d6460; --sidebar:#134e4a }

/* ── BASE ── */
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0 }
html{ height:100% }
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:15px;
  line-height:1.5;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
  min-height:100%;
}
button,input,select,textarea{ font-family:inherit }
button{ cursor:pointer }
::-webkit-scrollbar{ width:4px }

/* ── LAYOUT ── */
.app-shell{ display:flex; min-height:100vh; min-height:100dvh }
.sidebar{ display:none }

  padding:14px 16px 12px;

}

  display:flex;

}
.bnav-btn{

  transition:color 0.12s;

}
.bnav-icon{ font-size:22px; line-height:1.2 }
.bnav-btn.active{ color:#fff }
.bnav-btn.active .bnav-icon{ filter:drop-shadow(0 0 6px var(--accent)) }

/* ── DESKTOP ── */
@media(min-width:860px){

  .sidebar{

  .sidebar-name{ font-size:18px; font-weight:700; color:#f5f2ee; margin-bottom:28px }

/* ── CARDS ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);

  background:var(--bg); color:var(--text);
  border:1.5px solid var(--border);
  border-radius:12px; padding:12px 14px;
  outline:none; cursor:pointer;
  -webkit-appearance:none; appearance:none;

.toast{

  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if(k==='class') e.className=v;
    else if(k==='style') e.style.cssText=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);

function getDayOfYear() {
  const now=new Date();
  const start=new Date(now.getFullYear(),0,0);
  return Math.floor((now-start)/86400000);
}

function applyTheme() {
  const themes=['slate','rose','violet','teal','amber'];
  let cls=themes.includes(state.theme)?'theme-'+state.theme:'theme-slate';
  if(state.modoOscuro==='dark') cls+=' dark';
  else if(state.modoOscuro==='light') cls+=' light';
  document.body.className=cls;
}

function renderThemePicker() {
  const picker=$('theme-picker');

}

function renderTabs() {
  const allTabs=['diario','rutinas','proyectos','finanzas','menu','notas'];

    bn.innerHTML='';
    allTabs.forEach(function(t){
      const parts=(TAB_LABELS[t]||t).split(' ');
      const emoji=parts[0];
      const label=parts.slice(1).join(' ')||t;

    perfilRow.addEventListener('mouseenter',()=>perfilRow.style.background='rgba(255,255,255,0.1)');
    perfilRow.addEventListener('mouseleave',()=>perfilRow.style.background='transparent');
    sb.appendChild(perfilRow);
    Object.entries(TAB_SECTIONS).forEach(([section,tabs])=>{
      sb.appendChild(el('div',{class:'sidebar-section'},[section]));
      tabs.forEach(t=>{
        const b=el('button',{class:'sidebar-btn'+(state.tab===t?' active':''),onclick:()=>{state.showPerfil=false;setTab(t);}},[ TAB_LABELS[t]||t]);
        sb.appendChild(b);

function div(cls,children=[],style=''){
  return el('div',{class:cls,style},children);
}
function span(text,style=''){return el('span',{style},typeof text==='string'?[text]:[text]);}
function btn(text,cls,onclick,style=''){return el('button',{class:cls,onclick,style},[text]);}

// ── RENDER RUTINAS ──
function renderRutinas() {
  const hoy=getTodayKey();
  const todas=state.grupos.flatMap(g=>g.items.map(i=>({...i,color:g.color})));
  const doneHoy=todas.filter(r=>state.checks[`${hoy}__${r.id}`]).length;
  const total=todas.length;
  const pct=total===0?0:Math.round(doneHoy/total*100);

  let racha=0;
  for(let i=0;i<60;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=mkKey(d.getFullYear(),d.getMonth(),d.getDate());
    if(todas.some(r=>state.checks[`${k}__${r.id}`])) racha++;
    else if(i>0) break;
  }

  const c=$('content');
  c.innerHTML='';

  // Stats
  const stats=div('',[],'display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px');
  [[doneHoy,'hechas hoy','#dcfce7','#15803d'],[racha,'días racha','#ede9fe','#6d28d9'],[total,'hábitos','#dbeafe','#1d4ed8']].forEach(([v,s,bg,color])=>{
    const card=div('stat-card',[],`background:${bg};border:1px solid ${color}33`);
    card.appendChild(el('div',{style:`font-size:30px;font-weight:800;color:${color};line-height:1`},[String(v)]));
    card.appendChild(el('div',{style:`font-size:11px;color:${color};margin-top:5px;font-weight:500`},[s]));
    stats.appendChild(card);
  });
  c.appendChild(stats);

  // Progress
  const prog=div('card');
  const progTop=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-bottom:8px`);
  progTop.appendChild(span('Progreso de hoy','font-size:14px;font-weight:600'));
  progTop.appendChild(span(`${pct}%`,`font-size:17px;font-weight:800;color:${pct===100?'#15803d':'#1d4ed8'}`));
  prog.appendChild(progTop);
  const pbg=div('progress-bar-bg');
  const pb=div('progress-bar',[],`width:${pct}%;background:${pct===100?'#15803d':pct>50?'#1d4ed8':'#b45309'}`);
  pbg.appendChild(pb); prog.appendChild(pbg);
  prog.appendChild(el('div',{style:'font-size:12px;color:#475569;margin-top:6px'},[`${doneHoy} de ${total} — ${getTodayLabel()}`]));
  c.appendChild(prog);

  // Vista toggle + edit
  const controls=div('',[],`display:flex;gap:8px;margin-bottom:18px;align-items:center`);
  const vistaBox=div('',[],`display:flex;background:#fff;border-radius:12px;padding:4px;border:1px solid #e2e8f0;flex:1`);
  ['hoy','semana'].forEach(v=>{
    const b=btn(v==='hoy'?'Hoy':'Semana','',()=>{state.vistaRut=v;render();},`flex:1;border-radius:9px;font-size:14px;font-weight:${state.vistaRut===v?700:400};padding:9px;background:${state.vistaRut===v?'#0f172a':'transparent'};color:${state.vistaRut===v?'#f8fafc':'#475569'};border:none;cursor:pointer`);
    vistaBox.appendChild(b);
  });
  controls.appendChild(vistaBox);
  const editBtn=btn(state.editMode?'✓ Listo':'✏️','',()=>{state.editMode=!state.editMode;render();},`border-radius:10px;font-size:13px;font-weight:600;padding:10px 14px;background:${state.editMode?'#fef3c7':'#f1f5f9'};color:${state.editMode?'#b45309':'#475569'};border:1px solid ${state.editMode?'#b45309':'#e2e8f0'}`);
  controls.appendChild(editBtn);
  c.appendChild(controls);

  // Add rutina form
  if(state.editMode) {
    const addForm=div('card');
    addForm.appendChild(el('div',{style:'font-size:14px;font-weight:700;margin-bottom:10px'},['Agregar rutina']));
    const sel=el('select',{style:'width:100%;margin-bottom:8px;display:block'},state.grupos.map(g=>el('option',{value:g.id},[`${g.emoji} ${g.label}`])));
    addForm.appendChild(sel);
    const inp=el('input',{class:'inp',placeholder:'Nombre',style:'margin-bottom:8px;display:block',id:'new-rut-nombre'});
    addForm.appendChild(inp);
    const row=div('',[],`display:flex;gap:8px`);
    const fsel=el('select',{style:'flex:1;border:1px solid #e2e8f0;border-radius:10px;padding:11px 14px;background:#f8fafc;color:#0f172a;outline:none'},FREC_OPTS.map(f=>el('option',{value:f},[f])));
    row.appendChild(fsel);

      const nombre=$('new-rut-nombre').value.trim();
      if(!nombre) return;
      const gid=sel.value; const frec=fsel.value;

      section.appendChild(header);
      g.items.forEach(item=>{

      const addBtn=btn('+','',function(){

      addRow.appendChild(addBtn);

      c.appendChild(section);
    });

    // Semana view

    const grid=el('div',{style:'display:grid;grid-template-columns:1fr repeat(7,30px);gap:3px;margin-bottom:8px;align-items:center'});
    grid.appendChild(div(''));
    u7.forEach(d=>{
      const col=div('',[],`text-align:center`);
      col.appendChild(el('div',{style:`font-size:10px;color:${d.key===hoyK?'#1d4ed8':'#94a3b8'}`},[d.label]));
      const num=el('div',{style:`font-size:11px;font-weight:700;color:${d.key===hoyK?'#fff':'#475569'};background:${d.key===hoyK?'#1d4ed8':'transparent'};border-radius:5px;width:24px;height:24px;line-height:24px;margin:2px auto 0;text-align:center`},[String(d.dia)]);
      col.appendChild(num);
      grid.appendChild(col);
    });
    c.appendChild(grid);

    state.grupos.forEach(g=>{
      if(!g.items.length) return;
      const sec=div('',[],`margin-bottom:14px`);
      const hdr=div('',[],`display:flex;align-items:center;gap:7px;margin-bottom:6px`);
      hdr.appendChild(span(g.emoji,'font-size:14px'));
      hdr.appendChild(span(g.label,`font-size:12px;font-weight:700;color:${g.color}`));
      sec.appendChild(hdr);
      g.items.forEach(item=>{
        const row=el('div',{style:'display:grid;grid-template-columns:1fr repeat(7,30px);gap:3px;margin-bottom:5px;align-items:center'});
        row.appendChild(el('div',{style:'font-size:12px;color:#0f172a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:4px'},[item.nombre]));
        u7.forEach(d=>{
          const done=!!state.checks[`${d.key}__${item.id}`];
          const cell=div('semana-check'+(done?'':' '),done?['✓']:['']);
          cell.style.background=done?g.color:'#fff';
          cell.style.borderColor=done?g.color:'#e2e8f0';
          cell.addEventListener('click',()=>{const k=`${d.key}__${item.id}`;state.checks[k]=!state.checks[k];if(state.checks[k])vibrar();save();render();});
          row.appendChild(cell);
        });
        sec.appendChild(row);
      });
      c.appendChild(sec);
    });

    // Resumen
    const res=div('card');
    res.appendChild(el('div',{style:'font-size:14px;font-weight:700;margin-bottom:12px'},['Resumen semanal']));
    u7.forEach(d=>{
      const cnt=todas.filter(r=>state.checks[`${d.key}__${r.id}`]).length;
      const pct2=total===0?0:cnt/total*100;
      const row=div('',[],`display:flex;align-items:center;gap:10px;margin-bottom:8px`);
      row.appendChild(span(d.label,`font-size:12px;color:${d.key===hoyK?'#1d4ed8':'#475569'};width:22px;font-weight:${d.key===hoyK?700:400}`));
      const bg=div('progress-bar-bg',[],`flex:1`);
      const bar=div('progress-bar',[],`width:${pct2}%;background:${pct2===0?'transparent':pct2>=80?'#15803d':pct2>=50?'#1d4ed8':'#b45309'}`);
      bg.appendChild(bar); row.appendChild(bg);
      row.appendChild(span(`${cnt}/${total}`,'font-size:12px;color:#475569;width:32px;text-align:right'));
      res.appendChild(row);
    });
    c.appendChild(res);
  }

}

// ── RENDER MENÚ ──
function renderMenu() {
  const c=$('content');

  // Tabs: semanas + editar
  const topRow=div('',[],`display:flex;gap:6px;margin-bottom:12px;align-items:center`);
  const semRow=div('',[],`display:flex;gap:4px;flex:1`);
  [0,1,2,3].forEach(s=>{
    semRow.appendChild(btn(`Sem ${s+1}`,'',()=>{state.semana=s;state.menuEditDia=null;save();render();},`flex:1;border-radius:9px;font-size:12px;font-weight:${state.semana===s?700:400};padding:9px 2px;background:${state.semana===s?'#0f172a':'#fff'};color:${state.semana===s?'#f8fafc':'#475569'};border:1px solid ${state.semana===s?'#0f172a':'#e2e8f0'}`));
  });
  topRow.appendChild(semRow);
  topRow.appendChild(btn(state.verEsposo?'👫':'👤','',()=>{state.verEsposo=!state.verEsposo;render();},`border-radius:9px;font-size:13px;padding:9px 12px;background:#fff;border:1px solid #e2e8f0;color:#475569`));
  c.appendChild(topRow);

  // Use custom menus if they exist, otherwise fall back to MENU defaults
  if(!state.customMenu) state.customMenu={};

  DIAS_SEM.forEach((diaName,di)=>{
    const s=state.semana;
    const defaultDia=MENU[s]?.[di]||{al:{v:'',e:''},ce:{v:'',e:''},tip:''};
    const custom=state.customMenu[`${s}_${di}`]||{};
    const alText=typeof custom.al!=='undefined'?custom.al:defaultDia.al.v;
    const ceText=typeof custom.ce!=='undefined'?custom.ce:defaultDia.ce.v;
    const alIngs=custom.alIngs||'';
    const ceIngs=custom.ceIngs||'';
    const alK=`s${s}d${di}al`; const ceK=`s${s}d${di}ce`;
    const alDone=!!state.meals[alK]; const ceDone=!!state.meals[ceK];
    const isEditing=state.menuEditDia===`${s}_${di}`;

    const card=div('card');
    // Header
    const hdr=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-bottom:10px`);
    hdr.appendChild(span(diaName,'font-size:15px;font-weight:700'));
    const hdrRight=div('',[],`display:flex;gap:6px;align-items:center`);
    hdrRight.appendChild(span(alDone&&ceDone?'✓':'',`font-size:11px;color:#15803d;font-weight:700`));
    hdrRight.appendChild(btn(isEditing?'✓ Listo':'✏️','',()=>{
      if(isEditing){
        // save edits
        const alV=document.getElementById(`al_${s}_${di}`);
        const ceV=document.getElementById(`ce_${s}_${di}`);
        const alI=document.getElementById(`ali_${s}_${di}`);
        const ceI=document.getElementById(`cei_${s}_${di}`);
        if(!state.customMenu) state.customMenu={};
        state.customMenu[`${s}_${di}`]={
          al:alV?alV.value:alText,
          ce:ceV?ceV.value:ceText,
          alIngs:alI?alI.value:alIngs,
          ceIngs:ceI?ceI.value:ceIngs,
        };
        state.menuEditDia=null;
      } else {
        state.menuEditDia=`${s}_${di}`;
      }
      save(); render();
    },`border-radius:7px;font-size:12px;padding:5px 10px;background:${isEditing?'#dcfce7':'#f1f5f9'};color:${isEditing?'#15803d':'#475569'};border:1px solid ${isEditing?'#86efac':'#e2e8f0'}`));
    hdr.appendChild(hdrRight);
    card.appendChild(hdr);

    if(isEditing){
      // Edit mode
      [['al','☀ Almuerzo','#ea580c',`al_${s}_${di}`,alText,`ali_${s}_${di}`,alIngs],
       ['ce','🌙 Cena','#6d28d9',`ce_${s}_${di}`,ceText,`cei_${s}_${di}`,ceIngs]].forEach(([tipo,label,color,idv,val,idi,ings])=>{
        card.appendChild(el('div',{style:`font-size:10px;font-weight:700;color:${color};letter-spacing:1px;margin-bottom:4px`},[label]));
        const ta=el('textarea',{id:idv,rows:'2',style:'width:100%;margin-bottom:5px;font-size:13px'},[val]);
        card.appendChild(ta);
        card.appendChild(el('div',{style:'font-size:10px;color:#94a3b8;margin-bottom:4px'},['Ingredientes (separados por coma):']));
        const ing=el('input',{id:idi,class:'inp',placeholder:'ej: arroz, tofu, cebolla',style:'margin-bottom:10px;font-size:13px;display:block',value:ings});
        card.appendChild(ing);
        // Button to add ingredients to shopping list
        card.appendChild(btn(`+ Agregar ingredientes a compras`,'',()=>{
          const ingVal=document.getElementById(idi)?.value||'';
          if(!ingVal.trim()) return;
          const items=ingVal.split(',').map(s2=>s2.trim()).filter(Boolean);
          let added=0;
          items.forEach(texto=>{
            if(!state.compras.find(cc=>cc.texto.toLowerCase()===texto.toLowerCase())){
              state.compras.push({id:uid(),texto,hecho:false}); added++;
            }
          });
          save(); showToast(`✓ ${added} ingredientes en compras`);
        },`width:100%;border-radius:8px;font-size:12px;padding:8px;background:#f0fdf4;color:#15803d;border:1px solid #86efac;margin-bottom:12px`));
      });
    } else {
      // View mode
      [[alK,'al','☀ ALMUERZO','#ea580c','#fdba74',alDone,alText],
       [ceK,'ce','🌙 CENA','#6d28d9','#818cf8',ceDone,ceText]].forEach(([k,tipo,label,labelColor,leftColor,done,text])=>{
        const row=div('meal-row'+(done?' done':''));
        row.style.borderLeftColor=done?'#15803d':leftColor;
        row.addEventListener('click',()=>{state.meals[k]=!state.meals[k];if(state.meals[k])vibrar();save();render();});
        const cb=div('meal-check'+(done?' done':''),[done?'✓':'']);
        const info=div('',[],`flex:1`);
        info.appendChild(el('div',{style:`font-size:10px;font-weight:700;color:${labelColor};letter-spacing:1px;margin-bottom:3px`},[label]));
        info.appendChild(el('div',{style:`font-size:13px;color:${done?'#15803d':'#0f172a'};text-decoration:${done?'line-through':'none'}`},[text||'Sin planificar']));
        if(state.verEsposo&&defaultDia[tipo]?.e) info.appendChild(el('div',{style:'font-size:12px;color:#475569;margin-top:2px'},[`🍗 ${defaultDia[tipo].e}`]));
        row.appendChild(cb); row.appendChild(info);
        card.appendChild(row);
      });
    }
    c.appendChild(card);
  });
}

// ── RENDER CALENDARIO ──
function renderCalendario() {
  const c=$('content'); c.innerHTML='';
  const y=new Date().getFullYear(); const m=state.mes;

  // Sync bar
  const syncBar=div('',[],`display:flex;gap:8px;margin-bottom:14px;align-items:center`);
  if(!state.icalUrl) {
    const hint=el('div',{style:'font-size:12px;color:#94a3b8;flex:1;line-height:1.4'},['Para ver tus eventos de Google Calendar, pegá tu URL de iCal (Google Calendar → Configuración → dirección secreta en formato iCal)']);
    const configBtn=btn('Conectar','',()=>{
      const url=prompt('Pegá tu URL de Google Calendar (iCal):','');
      if(url&&url.includes('google.com')){state.icalUrl=url;save();syncGoogleCalendar();}
    },'background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;white-space:nowrap');
    syncBar.appendChild(hint);
    syncBar.appendChild(configBtn);
  } else {
    syncBar.appendChild(el('div',{style:'font-size:12px;color:#15803d;flex:1'},['✓ Google Calendar conectado']));
    const syncBtn=btn('↻ Sync','',syncGoogleCalendar,'background:#f0fdf4;color:#15803d;border:1px solid #86efac;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700');
    const disconnectBtn=btn('✕','',()=>{state.icalUrl='';save();render();},'background:#fff;color:#94a3b8;border:1px solid #e2e8f0;border-radius:8px;padding:7px 10px;font-size:12px');
    syncBar.appendChild(syncBtn);
    syncBar.appendChild(disconnectBtn);
  }
  c.appendChild(syncBar);

  const nav=div('',[],`display:flex;align-items:center;justify-content:space-between;margin-bottom:14px`);
  nav.appendChild(btn('←','',()=>{state.mes=Math.max(0,state.mes-1);render();},'background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:7px 14px;font-size:17px;color:#475569'));
  nav.appendChild(span(`${MESES[m]} ${y}`,'font-size:16px;font-weight:700'));
  nav.appendChild(btn('→','',()=>{state.mes=Math.min(11,state.mes+1);render();},'background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:7px 14px;font-size:17px;color:#475569'));
  c.appendChild(nav);
  const dayHdr=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px'});
  DC.forEach(d=>dayHdr.appendChild(el('div',{style:'text-align:center;font-size:11px;color:#94a3b8;font-weight:600;padding:3px 0'},[d])));
  c.appendChild(dayHdr);
  const evByDate={};
  state.eventos.forEach(e=>{if(!evByDate[e.fecha])evByDate[e.fecha]=[];evByDate[e.fecha].push(e);});
  const grid=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:10px'});
  const fd=firstDayOfMonth(y,m); const dim=daysInMonth(y,m);
  for(let i=0;i<fd;i++) grid.appendChild(div(''));
  const todayD=new Date().getDate(); const todayM=new Date().getMonth();
  for(let d=1;d<=dim;d++){
    const k=mkKey(y,m,d);
    const evs=evByDate[k]||[];
    const isHoy=d===todayD&&m===todayM;
    const isSel=d===state.diaSelec;
    const cell=div(`cal-cell${isHoy?' hoy':''}${isSel?' sel':''}`);
    cell.addEventListener('click',()=>{state.diaSelec=d;render();});
    const num=el('div',{style:`text-align:center;font-size:12px;font-weight:${isHoy||isSel?700:400};color:${isSel?'#f8fafc':isHoy?'#1d4ed8':'#475569'};margin-bottom:3px`},[String(d)]);
    cell.appendChild(num);
    if(evs.length){
      const dots=div('',[],`display:flex;flex-wrap:wrap;gap:2px;justify-content:center`);
      evs.slice(0,3).forEach(e=>{const dot=div('cal-dot',[],`background:${isSel?'#94a3b8':(TIPO_COLOR[e.tipo]||'#94a3b8')}`);dots.appendChild(dot);});
      cell.appendChild(dots);
    }
    grid.appendChild(cell);
  }
  c.appendChild(grid);
  const selKey=mkKey(y,m,state.diaSelec);
  const selEvs=(evByDate[selKey]||[]).sort((a,b)=>a.hora.localeCompare(b.hora));
  const evHdr=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;margin-top:4px`);
  evHdr.appendChild(span(`${state.diaSelec} ${MESES[m]}`,'font-size:16px;font-weight:700'));
  evHdr.appendChild(btn('+ Evento','',()=>{state.showEvForm=!state.showEvForm;render();},'background:#0f172a;color:#f8fafc;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600'));
  c.appendChild(evHdr);
  if(state.showEvForm){
    const form=div('card',[],`border:1.5px solid #1d4ed8`);
    const titInp=el('input',{class:'inp',placeholder:'Título del evento',id:'ev-titulo',style:'margin-bottom:8px;display:block'});
    const row2=div('',[],`display:flex;gap:8px;margin-bottom:10px`);
    const horaInp=el('input',{type:'time',value:'10:00',id:'ev-hora',style:'flex:1;border:1px solid #e2e8f0;border-radius:10px;padding:11px 14px;background:#f8fafc;color:#0f172a;outline:none'});
    const tipoSel=el('select',{id:'ev-tipo',style:'flex:1;border:1px solid #e2e8f0;border-radius:10px;padding:11px 14px;background:#f8fafc;color:#0f172a;outline:none'},Object.keys(TIPO_COLOR).map(t=>el('option',{value:t},[t])));
    row2.appendChild(horaInp); row2.appendChild(tipoSel);
    const btnRow=div('',[],`display:flex;gap:8px`);
    btnRow.appendChild(btn('Cancelar','',()=>{state.showEvForm=false;render();},'flex:1;background:transparent;border:1px solid #e2e8f0;border-radius:9px;padding:9px;color:#475569'));
    btnRow.appendChild(btn('Guardar','',()=>{
      const titulo=$('ev-titulo').value.trim();
      if(!titulo) return;
      state.eventos.push({fecha:selKey,hora:$('ev-hora').value,titulo,tipo:$('ev-tipo').value});
      state.showEvForm=false; save(); showToast('✓ Guardado'); render();
    },'flex:2;background:#0f172a;color:#fff;border:none;border-radius:9px;padding:9px;font-weight:700'));
    form.appendChild(titInp); form.appendChild(row2); form.appendChild(btnRow);
    c.appendChild(form);
  }
  if(!selEvs.length){
    c.appendChild(el('div',{style:'text-align:center;color:#94a3b8;padding:16px 0;font-size:13px'},['Sin eventos — tocá + Evento para agregar']));
  } else {
    selEvs.forEach((ev,i)=>{
      const row=div('mov-row',[],`border-left-color:${TIPO_COLOR[ev.tipo]||'#94a3b8'}`);
      row.appendChild(span(TIPO_ICON[ev.tipo]||'📅','font-size:18px'));
      const info=div('',[],`flex:1`);
      info.appendChild(el('div',{style:'font-size:14px;font-weight:500'},[ev.titulo]));
      if(ev.hora!=='00:00') info.appendChild(el('div',{style:'font-size:12px;color:#94a3b8;margin-top:2px'},[`${ev.hora} hs`]));
      row.appendChild(info);
      row.appendChild(btn('×','',()=>{state.eventos.splice(i,1);save();render();},'background:none;border:none;font-size:17px;color:#94a3b8;padding:0 3px'));
      c.appendChild(row);
    });
  }

  // ── TAREAS DEL DÍA ──
  const tareasHdr=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-top:20px;margin-bottom:10px`);
  tareasHdr.appendChild(span('Tareas del día','font-size:15px;font-weight:700'));
  c.appendChild(tareasHdr);

  const tareasKey=selKey;
  if(!state.tareas[tareasKey]) state.tareas[tareasKey]=[];
  const tareasHoy=state.tareas[tareasKey];

  // Input nueva tarea
  const tareaRow=div('',[],`display:flex;gap:8px;margin-bottom:10px`);
  const tareaInp=el('input',{id:'tarea-inp',class:'inp',placeholder:'Nueva tarea para este día...',style:'flex:1'});
  tareaInp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      const v=tareaInp.value.trim();
      if(!v) return;
      if(!state.tareas[tareasKey]) state.tareas[tareasKey]=[];
      state.tareas[tareasKey].push({id:uid(),texto:v,done:false});
      save(); render();
    }
  });
  const addTareaBtn=btn('+','',()=>{
    const inp=$('tarea-inp'); if(!inp) return;
    const v=inp.value.trim(); if(!v) return;
    if(!state.tareas[tareasKey]) state.tareas[tareasKey]=[];
    state.tareas[tareasKey].push({id:uid(),texto:v,done:false});
    save(); render();
  },'background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:16px;font-weight:700');
  tareaRow.appendChild(tareaInp);
  tareaRow.appendChild(addTareaBtn);
  c.appendChild(tareaRow);

  if(!tareasHoy.length){
    c.appendChild(el('div',{style:'text-align:center;color:#94a3b8;padding:12px 0;font-size:13px'},['Sin tareas para este día']));
  } else {
    tareasHoy.forEach((t,i)=>{
      const row=div('',[],`display:flex;align-items:center;gap:12px;padding:11px 14px;margin-bottom:7px;background:#fff;border:1.5px solid ${t.done?'#86efac':'#e2e8f0'};border-left:4px solid ${t.done?'#15803d':'var(--accent)'};border-radius:11px;transition:all 0.15s`);
      const cb=div('',[t.done?'✓':''],`width:24px;height:24px;border-radius:7px;flex-shrink:0;background:${t.done?'#15803d':'transparent'};border:2px solid ${t.done?'#15803d':'#e2e8f0'};display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;cursor:pointer`);
      cb.addEventListener('click',()=>{state.tareas[tareasKey][i].done=!t.done;if(!t.done)vibrar();save();render();});
      const txt=el('span',{style:`flex:1;font-size:14px;color:${t.done?'#94a3b8':'#0f172a'};text-decoration:${t.done?'line-through':'none'}`},[t.texto]);
      const del=btn('×','',()=>{state.tareas[tareasKey].splice(i,1);save();render();},'background:none;border:none;font-size:17px;color:#94a3b8;padding:0 3px');
      row.appendChild(cb); row.appendChild(txt); row.appendChild(del);
      c.appendChild(row);
    });
  }
}

  // Mes selector
  const mesRow=div('',[],`display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap`);

    mesRow.appendChild(btn(mm.slice(0,3),'',()=>{state.mes=i;render();},`border-radius:7px;font-size:11px;font-weight:${m===i?700:400};padding:5px 9px;background:${m===i?'var(--accent)':'#fff'};color:${m===i?'#fff':'#475569'};border:1px solid ${m===i?'var(--accent)':'#e2e8f0'}`));

  // Calcular totales
  const mesKey=`${y}-${String(mesNum).padStart(2,'0')}`;
  const movsDelMes=state.movs.filter(mv=>mv.fecha&&mv.fecha.startsWith(mesKey));
  const ingDelMes=movsDelMes.filter(mv=>mv.tipo==='ingreso');
  const gasVarDelMes=movsDelMes.filter(mv=>mv.tipo==='gasto');
  const totalIng=ingDelMes.reduce((s,mv)=>s+Number(mv.monto),0);
  const totalFijos=state.gastosFijos.reduce((s,g)=>s+Number(g.monto),0);
  const totalVar=gasVarDelMes.reduce((s,mv)=>s+Number(mv.monto),0);
  const balance=totalIng-totalFijos-totalVar;

  // ── REGLA 50/30/20 ──
  const reglaCard = div('card',[],`background:linear-gradient(135deg,#0f172a,#1e293b);border:none;margin-bottom:16px`);

  const sueldoHdr=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-bottom:16px`);

  sueldoHdr.appendChild(el('div',{style:'font-size:12px;color:#64748b;font-weight:600'},['€'+totalIng.toFixed(0)+' de ingresos']));

  const base = totalIng;

  if(base > 0) {

    const dis30 = base * 0.30;
    const aho20 = base * 0.20;
    const gastado_nec = totalFijos;
    const gastado_dis = totalVar;
    const gastado_aho = Math.max(0, base - totalFijos - totalVar);
    const pctFijos = Math.min(100, Math.round(gastado_nec / nec50 * 100));
    const pctVar   = Math.min(100, Math.round(gastado_dis / dis30 * 100));
    const pctAho   = Math.min(100, Math.round(gastado_aho / aho20 * 100));

    [
      {label:'50% Necesidades',  desc:'Gastos fijos',        target:nec50, real:gastado_nec, pct:pctFijos, color:'#3b82f6'},

      const ok = row2.real <= row2.target;
      const resto = row2.target - row2.real;
      const wrap=div('',[],`margin-bottom:16px`);
      const top=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-bottom:8px`);

      left2.appendChild(el('div',{style:'font-size:10px;color:#64748b;margin-top:1px'},[row2.desc+' · límite: €'+row2.target.toFixed(0)]));
      top.appendChild(left2);
      wrap.appendChild(top);
      const nums=div('',[],`display:flex;align-items:baseline;gap:6px;margin-bottom:6px`);
      nums.appendChild(el('span',{style:`font-size:26px;font-weight:800;color:${ok?row2.color:'#ef4444'}`},['€'+row2.real.toFixed(0)]));
      nums.appendChild(el('span',{style:'font-size:13px;color:#64748b'},['gastado']));
      wrap.appendChild(nums);
      const bgBar=div('',[],'height:8px;border-radius:99px;background:#1e293b;overflow:hidden');
      bgBar.appendChild(div('',[],'height:100%;border-radius:99px;transition:width 0.5s;background:'+(ok?row2.color:'#ef4444')+';width:'+Math.min(100,row2.pct)+'%'));
      wrap.appendChild(bgBar);
      const st=div('',[],`display:flex;justify-content:space-between;margin-top:4px`);
      if(!ok){
        st.appendChild(el('span',{style:'font-size:11px;color:#ef4444'},['⚠ Excediste el límite en €'+(row2.real-row2.target).toFixed(0)]));
      } else {
        st.appendChild(el('span',{style:'font-size:11px;color:#64748b'},['Te quedan €'+resto.toFixed(0)+' disponibles']));
        st.appendChild(el('span',{style:'font-size:11px;color:#64748b'},[Math.round(row2.pct)+'% usado']));
      }
      wrap.appendChild(st);
      reglaCard.appendChild(wrap);
    });

    // ── Ahorro: grande, acumulable ──
    // Ahorrado este mes = movs con cat='Ahorro' del mes actual
    const ahorradoMes = movsDelMes.filter(mv=>mv.cat==='Ahorro').reduce((s,mv)=>s+Number(mv.monto),0);
    // Ahorrado total acumulado = todos los movs con cat='Ahorro'
    const ahorradoTotal = state.movs.filter(mv=>mv.cat==='Ahorro').reduce((s,mv)=>s+Number(mv.monto),0);
    const metaMes = aho20;
    const pctAhoMes = Math.min(100, Math.round(ahorradoMes/metaMes*100));
    const ahorroOk = ahorradoMes >= metaMes;

    // Divider
    reglaCard.appendChild(el('div',{style:'border-top:1px solid #334155;margin:12px 0'}));

    const aWrap=div('',[],`background:#0f1f0f;border-radius:12px;padding:14px;margin-top:4px`);

    // Header
    const aHdr=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-bottom:12px`);
    aHdr.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:#22c55e'},['💰 20% Ahorro']));
    aHdr.appendChild(el('div',{style:'font-size:11px;color:#166534;background:#dcfce7;padding:3px 8px;border-radius:99px;font-weight:600'},['Meta: €'+metaMes.toFixed(0)+'/mes']));
    aWrap.appendChild(aHdr);

    // Este mes
    const aMesRow=div('',[],`margin-bottom:10px`);
    aMesRow.appendChild(el('div',{style:'font-size:10px;color:#4ade80;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px'},['Este mes — '+MESES[m]]));
    const aMesNums=div('',[],`display:flex;align-items:baseline;gap:8px;margin-bottom:6px`);
    aMesNums.appendChild(el('span',{style:`font-size:32px;font-weight:800;color:${ahorroOk?'#22c55e':'#facc15'}`},['€'+ahorradoMes.toFixed(0)]));
    aMesNums.appendChild(el('span',{style:'font-size:13px;color:#4ade80'},['ahorrado']));
    aMesRow.appendChild(aMesNums);
    const aBg=div('',[],'height:10px;border-radius:99px;background:#1a2e1a;overflow:hidden;margin-bottom:5px');
    aBg.appendChild(div('',[],'height:100%;border-radius:99px;transition:width 0.5s;background:'+(ahorroOk?'#22c55e':'#facc15')+';width:'+pctAhoMes+'%'));
    aMesRow.appendChild(aBg);
    if(ahorroOk){
      aMesRow.appendChild(el('div',{style:'font-size:11px;color:#22c55e'},['✓ Meta del mes cumplida']));
    } else if(ahorradoMes===0){
      aMesRow.appendChild(el('div',{style:'font-size:11px;color:#64748b'},['Registrá gastos con categoría "Ahorro" para trackear']));
    } else {
      aMesRow.appendChild(el('div',{style:'font-size:11px;color:#facc15'},['Faltan €'+(metaMes-ahorradoMes).toFixed(0)+' para la meta']));

    aWrap.appendChild(aMesRow);

    // Total acumulado
    if(ahorradoTotal > 0){

      aTotRow.appendChild(el('div',{style:'font-size:18px;font-weight:800;color:#22c55e'},['€'+ahorradoTotal.toFixed(0)]));
      aWrap.appendChild(aTotRow);

    reglaCard.appendChild(aWrap);
  } else {
    reglaCard.appendChild(el('div',{style:'font-size:13px;color:#64748b;text-align:center;padding:8px 0'},['Cargá tus ingresos del mes en la sección Ingresos para ver la distribución']));

  c.appendChild(resGrid);
  const resGrid2=div('',[],`display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px`);
  [
    ['↓ Gastos variables',totalVar,'#fef3c7','#b45309'],
    [balance>=0?'= Balance':'= Balance',balance,balance>=0?'#dbeafe':'#fee2e2',balance>=0?'#1d4ed8':'#b91c1c'],
  ].forEach(([lbl,val,bg,col])=>{
    const card=div('',[],'background:'+bg+';border:1px solid '+col+'33;border-radius:12px;padding:14px;text-align:center');
    card.appendChild(el('div',{style:`font-size:10px;color:${col};font-weight:700;letter-spacing:1px;margin-bottom:4px`},[lbl]));
    card.appendChild(el('div',{style:`font-size:22px;font-weight:800;color:${col}`},[(balance>=0&&lbl.includes('Balance')?'+':'')+`€${Math.abs(val).toFixed(0)}`]));
    resGrid2.appendChild(card);
  });
  c.appendChild(resGrid2);

  // ── INGRESOS ──
  const ingCard=div('card');
  const ingHdr=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-bottom:10px`);
  ingHdr.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:#15803d'},['↑ Ingresos del mes']));
  ingHdr.appendChild(btn('+ Agregar','',()=>{state.showIngForm=!state.showIngForm;render();},'font-size:12px;padding:5px 10px;background:#dcfce7;color:#15803d;border:1px solid #86efac;border-radius:7px'));
  ingCard.appendChild(ingHdr);
  if(state.showIngForm){
    const f=div('',[],`margin-bottom:10px`);

    // Category buttons — click fills description field

    CATS_ING.forEach(cat=>{
      const cb=btn(cat,'',()=>{
        const inp=document.getElementById('ing-desc');
        if(inp){ inp.value=cat; inp.focus(); }

    const mInp=el('input',{id:'ing-monto',type:'number',placeholder:'€',style:'flex:1;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:14px;background:#fff;color:#0f172a;outline:none'});
    const saveBtn=btn('✓','',()=>{
      const desc=document.getElementById('ing-desc').value.trim();

      if(!desc||!monto) return;
      state.movs.unshift({id:uid(),desc,monto:Number(monto),tipo:'ingreso',cat:desc,fecha:mesKey+'-01'});

    },'background:#15803d;color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:15px;font-weight:700');
    mrow.appendChild(dInp); mrow.appendChild(mInp); mrow.appendChild(saveBtn);
    f.appendChild(mrow);
    ingCard.appendChild(f);

  if(!ingDelMes.length){
    ingCard.appendChild(el('div',{style:'font-size:12px;color:#94a3b8;padding:6px 0'},['Sin ingresos registrados este mes']));
  } else {
    const table=el('div',{style:'width:100%'});
    ingDelMes.forEach((mv,i)=>{
      const row=div('',[],`display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f5f9`);
      row.appendChild(el('div',{style:'font-size:13px;color:#0f172a;flex:1'},[mv.desc]));
      const right=div('',[],`display:flex;align-items:center;gap:8px`);
      right.appendChild(span(`+€${Number(mv.monto).toFixed(2)}`,'font-size:14px;font-weight:700;color:#15803d'));
      right.appendChild(btn('×','',()=>{const idx=state.movs.indexOf(mv);if(idx>-1){state.movs.splice(idx,1);save();render();}},'background:none;border:none;color:#94a3b8;font-size:16px;padding:0 2px;cursor:pointer'));
      row.appendChild(right);
      table.appendChild(row);

    const totRow=div('',[],`display:flex;justify-content:space-between;padding-top:8px;margin-top:4px`);

    totRow.appendChild(span(`+€${totalIng.toFixed(2)}`,'font-size:14px;font-weight:800;color:#15803d'));
    table.appendChild(totRow);
    ingCard.appendChild(table);
  }
  c.appendChild(ingCard);

  // ── GASTOS FIJOS ──
  const fijCard=div('card');
  const fijHdr=div('',[],`display:flex;justify-content:space-between;align-items:center;margin-bottom:10px`);

  fijHdr.appendChild(btn('+ Agregar','',()=>{state.showFijForm=!state.showFijForm;render();},'font-size:12px;padding:5px 10px;background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;border-radius:7px'));
  fijCard.appendChild(fijHdr);

      const already=state.gastosFijos.find(g=>g.nombre===op.nombre);
      const opBtn=el('button',{style:`padding:6px 10px;border-radius:8px;font-size:12px;border:1px solid ${already?'#15803d':'#e2e8f0'};background:${already?'#dcfce7':'#f8fafc'};color:${already?'#15803d':'#475569'};cursor:pointer;font-family:inherit`},[`${op.emoji} ${op.nombre}${op.monto?` €${op.monto}`:''}`]);
      opBtn.addEventListener('click',()=>{
        if(already){ state.gastosFijos=state.gastosFijos.filter(g=>g.nombre!==op.nombre); save(); render(); return; }

        if(monto===0){
          const m=prompt(`Monto mensual para "${op.nombre}" (€):`,'');
          if(!m) return;
          state.gastosFijos.push({id:uid(),nombre:op.nombre,monto:Number(m),cat:'Fijo'});
        } else {
          state.gastosFijos.push({id:uid(),nombre:op.nombre,monto,cat:'Fijo'});

        save(); showToast('✓ Agregado'); render();

      pickerGrid.appendChild(opBtn);

  varHdr.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:#b45309'},['↓ Gastos variables']));
  varHdr.appendChild(btn('+ Agregar','',()=>{state.showVarForm=!state.showVarForm;render();},'font-size:12px;padding:5px 10px;background:#fef3c7;color:#b45309;border:1px solid #fde68a;border-radius:7px'));
  varCard.appendChild(varHdr);

  card.appendChild(row);

  card.appendChild(btn(`🍽 Generar desde menú semana ${state.semana+1}`,'',()=>{
    const ings=new Set();
    MENU[state.semana].forEach(dia=>{
      [dia.al.v,dia.ce.v].forEach(plato=>{
        ['tofu','arroz','palta','tomate','lechuga','papa','batata','choclo','cebolla','morón','falafel','dumplings','leche de coco','queso','huevo'].forEach(ing=>{
          if(plato.toLowerCase().includes(ing)) ings.add(ing.charAt(0).toUpperCase()+ing.slice(1));
        });
      });
    });
    const nuevos=[...ings].filter(ing=>!state.compras.find(cc=>cc.texto.toLowerCase()===ing.toLowerCase())).map(ing=>({id:uid(),texto:ing,hecho:false}));
    state.compras.push(...nuevos); save(); showToast(`✓ ${nuevos.length} ingredientes`); render();

      row2.appendChild(cb);

      card.appendChild(row2);

}

        var tdel=btn('×','',function(){},'background:none;border:none;color:var(--faint);font-size:15px;padding:0 2px;cursor:pointer');
        (function(pi,ti2){tdel.addEventListener('click',function(){state.proyectos[pi].tareas.splice(ti2,1);save();render();});})(i,ti);

const PAGE_TITLES = {
  'rutinas':'Rutinas','menú':'Menú semanal','calendario':'Calendario',
  'finanzas':'Finanzas','proyectos':'Proyectos',
  'compras':'Lista de compras','notas':'Notas'
};
function renderContent() {
  try {
  // Update header name (tap to open perfil)
  const un=$('mobile-username');
  if(un) {
    un.textContent=((state.perfil&&state.perfil.emoji)||'')+((state.perfil&&state.perfil.nombre)?` ${state.perfil.nombre}`:'Mi app');
    un.style.cursor='pointer';
    un.onclick=function(){ state.showPerfil=true; render(); };
  }
  const t=state.tab;
  if(state.showPerfil){ renderPerfilEditor(); return; }
  if(t==='diario') renderDiario();
  else if(t==='rutinas') renderRutinas();
  else if(t==='proyectos') renderProyectosTab();
  else if(t==='trabajo'){state.proyVista='trabajo';state.tab='proyectos';renderProyectosTab();}
  else if(t==='finanzas') renderFinanzas();
  else if(t==='menu') renderMenuTab();
  else if(t==='compras'){state.vidaVista='compras';state.tab='menu';renderMenuTab();}
  else if(t==='notas') renderNotas();
  else if(t==='casa'){state.tab='rutinas';renderRutinas();}
  else if(t==='vida'||t==='personal'){state.tab='menu';renderMenuTab();}
  } catch(err) {
    console.error('renderContent error:', err);
    const c=$('content');
    if(c) c.innerHTML='<div style="padding:20px;color:#b91c1c;font-size:13px;background:#fee2e2;border-radius:8px;margin:20px"><b>Error:</b> '+err.message+'<br><small>'+err.stack+'</small></div>';
  }
}

// ── GOOGLE CALENDAR SYNC ──
async function syncGoogleCalendar() {
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        mcp_servers: [{type:'url',url:'https://calendarmcp.googleapis.com/mcp/v1',name:'gcal'}],
        messages: [{role:'user',content:`Lista los eventos de Google Calendar para el mes actual ${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}. Responde SOLO con un JSON array: [{"fecha":"YYYY-MM-DD","hora":"HH:MM","titulo":"string","tipo":"trabajo"}]. Sin texto extra.`}]
      })
    });
    const data = await response.json();
    const textBlock = data.content&&data.content.find(b=>b.type==='text');
    if(!textBlock&&textBlock.text) return;
    const clean = textBlock.text.replace(/```json|```/g,'').trim();
    const gcalEvs = JSON.parse(clean);
    if(!Array.isArray(gcalEvs)) return;
    // Merge: add gcal events not already in state
    let added=0;
    gcalEvs.forEach(ev=>{
      const exists=state.eventos.find(e=>e.fecha===ev.fecha&&e.titulo===ev.titulo);
      if(!exists){ state.eventos.push({...ev,fromGcal:true}); added++; }
    });
    if(added>0){ save(); render(); showToast(`✓ ${added} eventos de Google Calendar`); }
  } catch(e){ console.log('GCal sync error:',e); }
}

// ── Genera ícono dinámico desde el emoji del perfil ──
function generateIcon(emoji, bgColor) {
  try {
    const size = 512;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    // Background rounded rect
    const r = size * 0.22;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size-r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size-r);
    ctx.quadraticCurveTo(size, size, size-r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size-r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = bgColor || '#7c5cfc';
    ctx.fill();
    // Emoji
    ctx.font = (size * 0.55) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji || '✨', size/2, size/2 + size*0.04);
    return canvas.toDataURL('image/png');
  } catch(e) { return null; }
}

function applyAppIcon() {
  const emoji = (state.perfil && state.perfil.emoji) || '✨';
  const bg = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#7c5cfc';
  const iconUrl = generateIcon(emoji, bg);
  if(!iconUrl) return;
  // Apple touch icon
  let link = document.querySelector("link[rel='apple-touch-icon']");
  if(!link) { link = document.createElement('link'); link.rel='apple-touch-icon'; document.head.appendChild(link); }
  link.href = iconUrl;
  // Favicon
  let fav = document.querySelector("link[rel='icon']");
  if(!fav) { fav = document.createElement('link'); fav.rel='icon'; document.head.appendChild(fav); }
  fav.href = iconUrl;
}

// Start
applyTheme();
applyAppIcon();
if(!state.perfil) {
  renderOnboarding();
  ocultarSplash();
} else {
  render();
  ocultarSplash();
  setTimeout(sbLoadAndMerge, 1000);
}
